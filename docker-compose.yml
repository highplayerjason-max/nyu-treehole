services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: student_community
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    # Use pre-built image from GitHub Container Registry (built by GitHub Actions)
    # This avoids running npm build on the server (too memory-intensive for 2GB VPS)
    image: ghcr.io/highplayerjason-max/nyu-treehole:latest
    restart: unless-stopped
    ports:
      - "80:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/student_community
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
