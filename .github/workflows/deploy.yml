name: Build and Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image locally
        run: |
          docker build \
            --build-arg NODE_OPTIONS=--max-old-space-size=4096 \
            -t nyu-treehole:latest \
            .

      - name: Export image to compressed tar
        run: |
          docker save nyu-treehole:latest | gzip > nyu-treehole.tar.gz
          ls -lh nyu-treehole.tar.gz

      - name: Copy image and docker-compose to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          source: nyu-treehole.tar.gz,docker-compose.yml
          target: /root/nyu-treehole
          overwrite: true
          timeout: 300s

      - name: Deploy on server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 10m
          script: |
            set -e
            cd /root/nyu-treehole

            docker load < nyu-treehole.tar.gz
            rm -f nyu-treehole.tar.gz

            docker compose up -d

            for i in $(seq 1 30); do
              if docker compose exec -T app true >/dev/null 2>&1; then
                break
              fi

              if [ "$i" -eq 30 ]; then
                echo "App container did not become ready in time" >&2
                exit 1
              fi

              sleep 2
            done

            docker compose exec -T app npx prisma@6.19.2 migrate deploy

            docker exec nyu-treehole-db-1 psql \
              -U postgres \
              -d student_community \
              -c 'ALTER TABLE "TreeholePost" ADD COLUMN IF NOT EXISTS "imageUrl" TEXT;' || true

            echo "Deploy done at $(date)"
