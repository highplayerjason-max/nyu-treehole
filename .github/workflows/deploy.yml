# 部署流程：
# 1. GitHub Actions runner 上构建 Docker 镜像
# 2. docker save 导出为 tar.gz（绕过 ghcr.io，解决国内服务器拉镜像超时）
# 3. SCP 直传到阿里云服务器
# 4. 服务器 docker load 加载镜像并重启服务
name: Build & Deploy to Server

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image locally
        run: |
          docker build \
            --build-arg NODE_OPTIONS=--max-old-space-size=4096 \
            -t nyu-treehole:latest \
            .

      - name: Export image to compressed tar
        run: |
          docker save nyu-treehole:latest | gzip > /tmp/nyu-treehole.tar.gz
          ls -lh /tmp/nyu-treehole.tar.gz

      - name: Copy image to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          source: /tmp/nyu-treehole.tar.gz
          target: /root
          strip_components: 1

      - name: Deploy on server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 10m
          script: |
            # 加载镜像
            docker load < /root/nyu-treehole.tar.gz
            # 清理传输文件
            rm -f /root/nyu-treehole.tar.gz
            # 进入项目目录
            cd /root/nyu-treehole
            # 重启服务（使用本地镜像，不再从 ghcr.io 拉取）
            docker compose up -d
            # 等数据库就绪
            sleep 5
            # 执行数据库迁移
            docker compose exec -T app npx prisma@6.19.2 migrate deploy
            # 临时补丁
            docker exec nyu-treehole-db-1 psql -U postgres -d student_community -c 'ALTER TABLE "TreeholePost" ADD COLUMN IF NOT EXISTS "imageUrl" TEXT;' || true
            echo "Deploy done at $(date)"
